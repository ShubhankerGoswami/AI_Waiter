<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 245 72" fill="none" width="245" height="72">
  <defs>
    <!-- Edge gradient: orange → white (icon coordinate space) -->
    <linearGradient id="eg" x1="0" y1="0" x2="60" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#f97316"/>
      <stop offset="55%"  stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.9"/>
    </linearGradient>
    <!-- Node gradient: white center → orange rim -->
    <radialGradient id="ng" cx="38%" cy="32%" r="65%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f97316"/>
    </radialGradient>
    <!-- Glow filter for nodes -->
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Text gradient: orange → white (left to right) -->
    <linearGradient id="tg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#f97316"/>
      <stop offset="50%"  stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ffffff"/>
    </linearGradient>
  </defs>

  <!-- ── Neural network icon (60×72 area) ── -->

  <!-- Edges -->
  <line x1="30" y1="5"  x2="7"  y2="22" stroke="url(#eg)" stroke-width="1.6" stroke-opacity="0.75" stroke-linecap="round"/>
  <line x1="30" y1="5"  x2="53" y2="20" stroke="url(#eg)" stroke-width="1.6" stroke-opacity="0.75" stroke-linecap="round"/>
  <line x1="30" y1="5"  x2="28" y2="36" stroke="url(#eg)" stroke-width="1.6" stroke-opacity="0.75" stroke-linecap="round"/>
  <line x1="7"  y1="22" x2="53" y2="20" stroke="url(#eg)" stroke-width="1.6" stroke-opacity="0.75" stroke-linecap="round"/>
  <line x1="7"  y1="22" x2="28" y2="36" stroke="url(#eg)" stroke-width="1.6" stroke-opacity="0.75" stroke-linecap="round"/>
  <line x1="7"  y1="22" x2="9"  y2="52" stroke="url(#eg)" stroke-width="1.6" stroke-opacity="0.75" stroke-linecap="round"/>
  <line x1="53" y1="20" x2="28" y2="36" stroke="url(#eg)" stroke-width="1.6" stroke-opacity="0.75" stroke-linecap="round"/>
  <line x1="53" y1="20" x2="51" y2="52" stroke="url(#eg)" stroke-width="1.6" stroke-opacity="0.75" stroke-linecap="round"/>
  <line x1="28" y1="36" x2="9"  y2="52" stroke="url(#eg)" stroke-width="1.6" stroke-opacity="0.75" stroke-linecap="round"/>
  <line x1="28" y1="36" x2="51" y2="52" stroke="url(#eg)" stroke-width="1.6" stroke-opacity="0.75" stroke-linecap="round"/>
  <line x1="28" y1="36" x2="28" y2="65" stroke="url(#eg)" stroke-width="1.6" stroke-opacity="0.75" stroke-linecap="round"/>
  <line x1="9"  y1="52" x2="51" y2="52" stroke="url(#eg)" stroke-width="1.6" stroke-opacity="0.75" stroke-linecap="round"/>
  <line x1="9"  y1="52" x2="28" y2="65" stroke="url(#eg)" stroke-width="1.6" stroke-opacity="0.75" stroke-linecap="round"/>
  <line x1="51" y1="52" x2="28" y2="65" stroke="url(#eg)" stroke-width="1.6" stroke-opacity="0.75" stroke-linecap="round"/>
  <!-- Cross diagonals -->
  <line x1="7"  y1="22" x2="51" y2="52" stroke="url(#eg)" stroke-width="1.6" stroke-opacity="0.75" stroke-linecap="round"/>
  <line x1="53" y1="20" x2="9"  y2="52" stroke="url(#eg)" stroke-width="1.6" stroke-opacity="0.75" stroke-linecap="round"/>

  <!-- Nodes -->
  <circle cx="30" cy="5"  r="3"   fill="url(#ng)" filter="url(#glow)"/>
  <circle cx="7"  cy="22" r="3"   fill="url(#ng)" filter="url(#glow)"/>
  <circle cx="53" cy="20" r="3"   fill="url(#ng)" filter="url(#glow)"/>
  <circle cx="28" cy="36" r="4.5" fill="url(#ng)" filter="url(#glow)"/>
  <circle cx="9"  cy="52" r="3"   fill="url(#ng)" filter="url(#glow)"/>
  <circle cx="51" cy="52" r="3"   fill="url(#ng)" filter="url(#glow)"/>
  <circle cx="28" cy="65" r="3"   fill="url(#ng)" filter="url(#glow)"/>

  <!-- ── Text (starts at x=70) ── -->
  <text
    x="70" y="44"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="32"
    font-weight="700"
    letter-spacing="-0.5"
    fill="url(#tg)"
  >AI Waiter</text>

  <text
    x="71" y="60"
    font-family="Inter, system-ui, -apple-system, sans-serif"
    font-size="10"
    font-weight="500"
    letter-spacing="2.5"
    fill="#9ca3af"
  >BEING COGNI</text>
</svg>
